<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Inscriptos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-7xl mx-auto space-y-8 glass-panel p-10 rounded-2xl fade-in relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-400 via-indigo-500 to-purple-600"></div>

        <div class="flex justify-between items-end">
            <div>
                <h2 class="mt-2 text-4xl font-extrabold text-gray-900 tracking-tight">
                    Alumnos Inscriptos
                </h2>
                <p class="mt-4 text-lg text-gray-600">
                    Listado público de cupos asignados por comisión.
                </p>
            </div>
            <div>
                <a href="/" class="text-indigo-600 hover:text-indigo-800 font-medium">Volver a Inscripción &rarr;</a>
            </div>
        </div>

        <div id="loading" class="text-center py-20 text-gray-500">
            <svg class="animate-spin h-10 w-10 mx-auto text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Cargando registros...
        </div>

        <div id="content" class="mt-8 space-y-12 hidden">
            <!-- Pushed by JS -->
        </div>
    </div>

    <script>
        async function loadInscriptos() {
            try {
                const res = await fetch('/api/inscriptos');
                const data = await res.json();
                
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = '';
                
                if (data.length === 0) {
                    contentDiv.innerHTML = '<p class="text-gray-500 text-center py-10">Aún no hay alumnos inscriptos en ninguna comisión.</p>';
                } else {
                    data.forEach(commission => {
                        // Create section for each commission
                        const section = document.createElement('div');
                        section.className = "bg-white shadow rounded-lg overflow-hidden";
                        
                        // Header
                        const header = document.createElement('div');
                        header.className = "px-6 py-5 border-b border-gray-200 bg-gray-50 flex justify-between items-center";
                        header.innerHTML = `
                            <h3 class="text-xl font-bold leading-6 text-gray-900">${commission.name}</h3>
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-indigo-100 text-indigo-800">
                                ${commission.time_range}
                            </span>
                        `;
                        section.appendChild(header);

                        // Table
                        const tableWrapper = document.createElement('div');
                        tableWrapper.className = "overflow-x-auto";
                        
                        if (commission.students.length === 0) {
                            tableWrapper.innerHTML = '<p class="text-sm text-gray-500 px-6 py-4">No hay alumnos en esta comisión.</p>';
                        } else {
                            let tableHtml = `
                            <table class="min-w-full divide-y divide-gray-200 text-sm">
                                <thead class="bg-white">
                                    <tr>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Apellido y Nombre</th>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">DNI</th>
                                        <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">HASH de Inscrip.</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                            `;
                            
                            commission.students.forEach((s, idx) => {
                                // Add subtle zebra striping
                                const bgClass = idx % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                                tableHtml += `
                                <tr class="${bgClass} hover:bg-indigo-50 transition-colors">
                                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">${s.apellido}, ${s.nombre}</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-gray-600 font-mono tracking-widest">${s.dni}</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-gray-400 text-right font-mono text-xs">${s.hash}</td>
                                </tr>
                                `;
                            });
                            
                            tableHtml += `</tbody></table>`;
                            tableWrapper.innerHTML = tableHtml;
                        }
                        
                        section.appendChild(tableWrapper);
                        
                        // Footer with total count
                        const footer = document.createElement('div');
                        footer.className = "px-6 py-3 bg-gray-50 border-t border-gray-200 text-right text-sm text-gray-500 font-medium";
                        footer.textContent = `Total inscriptos: ${commission.students.length}`;
                        section.appendChild(footer);

                        contentDiv.appendChild(section);
                    });
                }
                
                document.getElementById('loading').classList.add('hidden');
                contentDiv.classList.remove('hidden');
            } catch (error) {
                console.error("Error cargando inscriptos:", error);
                document.getElementById('loading').innerHTML = '<p class="text-red-500">Ocurrió un error al cargar la información.</p>';
            }
        }

        loadInscriptos();
    </script>
</body>
</html>
